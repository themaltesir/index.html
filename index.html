<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Recomp43</title>
<style>
:root{--bg:#0e1116;--card:#171c24;--card2:#1e2530;--line:#2a3342;--txt:#e8edf4;--dim:#8b97a8;--acc:#4fc3f7;--grn:#5dd39e;--amb:#ffc766;--red:#ff7a7a;--pink:#f48fb1;--pur:#b39ddb}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;padding-bottom:80px}
header{position:sticky;top:0;z-index:10;background:rgba(14,17,22,.95);backdrop-filter:blur(8px);padding:10px 14px 8px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
header h1{font-size:16px;letter-spacing:.5px}
header h1 span{color:var(--acc)}
.sub{color:var(--dim);font-size:11.5px}
.pswitch{display:flex;gap:4px}
.pswitch button{border:1px solid var(--line);background:var(--card2);color:var(--dim);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:600}
.pswitch button.on{background:var(--acc);color:#06222e;border-color:var(--acc)}
.pswitch button.onher{background:var(--pink);color:#3d0f22;border-color:var(--pink)}
main{padding:12px 12px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.card h2{font-size:14.5px;margin-bottom:7px;color:var(--acc)}
.card h3{font-size:13px;margin:8px 0 4px}
.card p{margin-bottom:7px}
.dim{color:var(--dim);font-size:12.5px}
.small{font-size:12.5px}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:5px 0}
th{color:var(--dim);text-align:left;font-weight:600;padding:4px 5px;border-bottom:1px solid var(--line)}
td{padding:5px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
.chip{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12px;margin:2px 4px 2px 0}
.chip.on{background:var(--acc);color:#06222e;border-color:var(--acc);font-weight:600}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--acc);color:#06222e;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;width:100%}
.btn.pinkbg{background:var(--pink);color:#3d0f22}
.btn2{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12.5px}
.btn3{background:none;border:none;color:var(--red);font-size:16px;padding:2px 8px}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,17,22,.97);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20}
nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px}
nav button .ic{font-size:19px;line-height:1}
nav button.on{color:var(--acc)}
.ex{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px}
.ex .name{font-weight:600;font-size:14.5px}
.ex .scheme{color:var(--grn);font-size:12px;margin:2px 0}
.ex .cue{color:var(--dim);font-size:11.5px}
.ex .sugg{color:var(--pur);font-size:12.5px;margin-top:4px;font-weight:600}
.ex .last{color:var(--dim);font-size:11.5px;margin-top:2px}
select,input[type=text],input[type=number],input[type=date],input[type=time],textarea{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:14px;width:100%}
select{width:auto;background:var(--card);font-size:12px;padding:5px 8px;max-width:170px}
label{font-size:11.5px;color:var(--dim);display:block;margin:7px 0 3px}
.setrow{display:flex;gap:6px;align-items:center;margin:4px 0}
.setrow input{width:70px;text-align:center;padding:6px 4px}
.setrow .sn{color:var(--dim);font-size:12px;width:38px}
.tag{font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.tag.main{background:#153a52;color:var(--acc)}
.tag.acc{background:#1d3a2d;color:var(--grn)}
.tag.ss{background:#3a2d15;color:var(--amb)}
.tag.iso{background:#33202c;color:var(--pink)}
.banner{border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:13px;border:1px solid}
.banner.g{background:#12261d;border-color:#1f4433;color:var(--grn)}
.banner.a{background:#2b2312;border-color:#4d3f1e;color:var(--amb)}
.banner.r{background:#2b1515;border-color:#4d2424;color:var(--red)}
.banner.n{background:#181f2b;border-color:#2a3a52;color:var(--dim)}
.timer{position:fixed;bottom:66px;left:0;right:0;text-align:center;z-index:15;pointer-events:none}
.timer .box{display:inline-block;background:var(--acc);color:#06222e;font-weight:700;font-size:22px;padding:8px 26px;border-radius:30px;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.row{display:flex;gap:7px;flex-wrap:wrap}
.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
details{margin-bottom:6px}
summary{cursor:pointer;font-weight:600;font-size:13.5px;padding:8px 0}
summary::marker{color:var(--acc)}
.hide{display:none!important}
ul{padding-left:18px;margin-bottom:7px}
li{margin-bottom:3px}
.kpi{background:var(--card2);border-radius:10px;padding:9px 6px;text-align:center}
.kpi .v{font-size:16px;font-weight:700;color:var(--acc)}
.kpi .v.over{color:var(--red)}
.kpi .v.good{color:var(--grn)}
.kpi .k{font-size:10px;color:var(--dim)}
.bar{height:6px;background:var(--card2);border-radius:3px;margin-top:4px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--acc);border-radius:3px}
.bar i.over{background:var(--red)}
.fresult{padding:8px 5px;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;justify-content:space-between;cursor:pointer}
.fresult .m{color:var(--dim);font-size:11.5px}
.fentry{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.tl{border-left:2px solid var(--line);padding-left:12px;margin-left:4px}
.tl div{margin-bottom:7px;font-size:13px}
.tl b{color:var(--acc);font-size:12.5px}
hr{border:none;border-top:1px solid var(--line);margin:8px 0}
</style>
</head>
<body>
<header>
  <div><h1>RECOMP<span>43</span></h1><div class="sub" id="hdrSub2"></div></div>
  <div class="pswitch" id="pswitch"></div>
</header>
<main id="main"></main>
<div class="timer hide" id="timer"><div class="box" id="timerBox" onclick="stopTimer()">0:00</div></div>
<nav id="nav"></nav>

<script>
const VERSION='3.0';
/* ============ STORAGE / PROFILE ============ */
const S={
 get(k,d){try{const v=localStorage.getItem('r43_'+k);return v===null?d:JSON.parse(v)}catch(e){return d}},
 set(k,v){try{localStorage.setItem('r43_'+k,JSON.stringify(v))}catch(e){}}
};
const todayKey=(d)=>{const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')};
const dayName=k=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(k+'T12:00').getDay()];
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-');
let tab=S.get('tab','today'), openSession=null, foodDate=todayKey(), foodQ='';
let prof=S.get('prof','me');
const P=()=>prof==='her'?'her_':'';
function setProf(p){prof=p;openSession=null;S.set('prof',p);render()}

/* ============ SETTINGS ============ */
function cfg(){return S.get('cfg',{wt:86,wtHer:64,mode:'recomp',start:'',wake:'07:30'})}
function setCfg(k,v){const c=cfg();c[k]=v;S.set('cfg',c);render()}
function myWt(){return prof==='her'?(cfg().wtHer||64):(cfg().wt||86)}
function weekNum(){
 const c=cfg(); if(!c.start) return 1;
 const d=Math.floor((new Date(todayKey()+'T12:00')-new Date(c.start+'T12:00'))/864e5);
 return Math.min(12,Math.max(1,Math.floor(d/7)+1));
}
function curBlock(){const w=weekNum();return w<=4?'b1':w<=8?'b2':'b3'}
function blockNum(){return{b1:1,b2:2,b3:3}[curBlock()]}
function isConsol(){return weekNum()%4===0}

/* ============ PERIODISATION ============ */
const BLOCKS={
 b1:{name:'Block 1 · Foundation',wks:'Wks 1–4',
  sch:{main:{sets:4,lo:6,hi:8,rir:2,rest:'2–3 min',note:'3s eccentric'},acc:{sets:3,lo:8,hi:12,rir:1,rest:'60–90s',note:'controlled'},ss:{sets:3,lo:10,hi:15,rir:1,rest:'60s after pair',note:'superset'},iso:{sets:2,lo:12,hi:15,rir:0,rest:'45s',note:''}},
  goal:'Technique, full range, slow eccentrics. Zone 2 base on Engine day.'},
 b2:{name:'Block 2 · Intensification',wks:'Wks 5–8',
  sch:{main:{sets:5,lo:4,hi:6,rir:2,rest:'3 min',note:'drive up fast'},acc:{sets:3,lo:6,hi:10,rir:1,rest:'90s',note:''},ss:{sets:3,lo:8,hi:12,rir:1,rest:'60s',note:'last set = drop set'},iso:{sets:2,lo:10,hi:12,rir:0,rest:'45s',note:'+drop set final'}},
  goal:'Heavier, more rest, explosive intent. Engine alternates Z2 / 4×4 intervals.'},
 b3:{name:'Block 3 · Definition',wks:'Wks 9–12',
  sch:{main:{sets:4,lo:8,hi:10,rir:1,rest:'2 min',note:'1s stretch pause'},acc:{sets:3,lo:10,hi:15,rir:1,rest:'60s',note:''},ss:{sets:3,lo:12,hi:15,rir:0,rest:'45s',note:'superset'},iso:{sets:3,lo:15,hi:20,rir:0,rest:'30s',note:'chase the pump'}},
  goal:'Density, stretch pauses, weekly intervals. The visible-definition block.'}
};
const schTxt=(s)=>`${s.lo}–${s.hi} reps · RIR ${s.rir} · rest ${s.rest}${s.note?' · '+s.note:''}`;
const CONSOL='Consolidation: −1 set everywhere, RIR 3, no finishers, same loads.';

/* ============ SESSIONS (Brian) ============ */
const ROT=['upA','loA','upB','eng'];
const SESSIONS=[
 {id:'upA',title:'Upper A — Chest & Back',dur:'55 min',lower:false,
  warm:'3 min row/bike · band pull-aparts ×15 · cat-cow ×8 · 2 ramp-up sets of first lift',
  work:[
   {t:'main',pool:['Flat DB Bench Press','Barbell Bench Press','Machine Chest Press','Weighted Dip','Smith Bench Press','Floor Press'],cue:'Full stretch, no bounce'},
   {t:'acc',pool:['Chest-Supported Row','Seated Cable Row','T-Bar Row','1-Arm DB Row','Machine Row','Barbell Row'],cue:'1s pause at chest'},
   {t:'acc',pool:['Incline Machine Press','Incline DB Press','Low-to-High Cable Fly','Pec Deck','Weighted Push-up','Incline Smith Press'],cue:'Upper chest, 30–45°'},
   {t:'acc',pool:['Lat Pulldown','Pull-up','Neutral-Grip Pulldown','Straight-Arm Pulldown','1-Arm Cable Pulldown','Chin-up'],cue:'Elbows down, chest tall'},
   {t:'ss',pool:['Cable Lateral Raise + Face Pull','DB Lateral Raise + Reverse Pec Deck','Machine Lateral Raise + Cable Rear-Delt Fly'],cue:'Light, perfect reps'}],
  fin:{name:'Bike sprints',desc:'6 × 20s hard / 40s easy',swaps:'Rower / ski erg'}},
 {id:'loA',title:'Lower A — Squat & Hinge',dur:'55 min',lower:true,
  warm:'3 min incline walk · 10 squats · 10 hinges · world’s greatest stretch ×3/side · ramp-ups',
  work:[
   {t:'main',pool:['Barbell or Smith Squat','Leg Press','Hack Squat','Front Squat','Heels-Elevated Goblet Squat','Belt Squat'],cue:'Depth over load'},
   {t:'acc',pool:['Romanian Deadlift','DB RDL','45° Back Extension','Hip Thrust','Cable Pull-Through','Good Morning (light)'],cue:'Hips back, hamstrings load'},
   {t:'acc',pool:['Bulgarian Split Squat','Walking Lunge','Smith Reverse Lunge','Step-Up','Leg Extension','Single-Leg Press'],cue:'Torso forward = more glute'},
   {t:'acc',pool:['Seated Leg Curl','Lying Leg Curl','Nordic Negatives','Swiss-Ball Curl','Glute-Ham Raise'],cue:'Seated beats lying'},
   {t:'ss',pool:['Standing Calf Raise + Cable Crunch','Leg-Press Calves + Hanging Knee Raise','Seated Calf Raise + Ab-Wheel Rollout'],cue:'2s stretch pause on calves'},
   {t:'iso',pool:['Leg Extension','Adductor Machine','Sissy Squat','Abductor Machine'],cue:'Optional — skip if over 55 min'}],
  fin:{name:'None — density day',desc:'Optional 5-min incline-walk cooldown.',swaps:''}},
 {id:'upB',title:'Upper B — Shoulders & Arms',dur:'55 min',lower:false,
  warm:'3 min row · band dislocates ×10 · scap pull-ups ×8 · ramp-ups',
  work:[
   {t:'main',pool:['Seated DB Shoulder Press','Machine Shoulder Press','Barbell OHP','Arnold Press','Landmine Press','Smith OHP'],cue:'No lower-back arch'},
   {t:'acc',pool:['Pull-up','Weighted Pull-up','Neutral-Grip Pulldown','Meadows Row','Machine Pulldown','Assisted Pull-up'],cue:'Full hang to chin over'},
   {t:'acc',pool:['Cable Fly','Pec Deck','Incline Cable Fly','DB Fly','Deficit Push-up AMRAP'],cue:'1s squeeze, wide stretch'},
   {t:'ss',pool:['EZ-Bar Curl + Rope Pressdown','DB Curl + Bench Dips','Cable Curl + Skullcrusher'],cue:'Elbows pinned'},
   {t:'ss',pool:['Incline DB Curl + Overhead Rope Extension','Hammer Curl + Close-Grip Push-up','Preacher Curl + JM Press'],cue:'Train the stretch'},
   {t:'iso',pool:['Reverse Pec Deck','Face Pull','Cable Rear-Delt Fly','Bent-Over Rear-Delt Raise'],cue:'Rear delts = 3D shoulders'},
   {t:'iso',pool:['DB Shrug','Farmer Carry 3×40m','Cable Shrug','Behind-Back Smith Shrug'],cue:'Optional traps/grip'}],
  fin:{name:'8-min EMOM',desc:'Odd: 12 KB swings · even: 8 push-ups',swaps:'Rower 8×100m'}},
 {id:'eng',title:'Engine — Conditioning & Core',dur:'50 min',lower:false,
  warm:'5 min easy',
  work:[
   {t:'main',pool:['Zone 2 — 35 min','Norwegian 4×4 (green days, Blocks 2–3)'],cue:'Z2: 106–124 bpm, conversational. 4×4: 4 min RPE 8 / 3 min easy ×4'},
   {t:'ss',pool:['Core Circuit ×3'],cue:'Dead bug ×10 · side plank 30s/side · Pallof ×12'},
   {t:'iso',pool:['Mobility — 8 min'],cue:'Couch stretch · 90/90 · t-spine · hamstring floss'}],
  fin:{name:'Hangover rule',desc:'Drank last night? Still train — RPE 5 cap, Z2 only, electrolytes first.',swaps:''}}
];

/* ============ SESSIONS (Her — glute/lower-biased, evidence-based for her goals) ============ */
const ROT_HER=['hlo1','hup','hlo2','heng'];
const SESSIONS_HER=[
 {id:'hlo1',title:'Lower A — Glutes & Hamstrings',dur:'50 min',lower:true,
  warm:'3 min incline walk · glute bridges ×12 · 10 hinges · monster walks ×10/side · ramp-ups',
  work:[
   {t:'main',pool:['Barbell Hip Thrust','Machine Hip Thrust','KAS Glute Bridge','Smith Hip Thrust'],cue:'Ribs down, full lockout, 1s squeeze'},
   {t:'acc',pool:['Romanian Deadlift','DB RDL','45° Back Extension','Cable Pull-Through'],cue:'Stretch the hamstrings, soft knees'},
   {t:'acc',pool:['Bulgarian Split Squat','Reverse Lunge','Step-Up','Walking Lunge'],cue:'Long stride = glute bias'},
   {t:'acc',pool:['Hip Abduction Machine','Cable Hip Abduction','Banded Side Steps'],cue:'Lean slightly forward, slow reps'},
   {t:'ss',pool:['Seated Leg Curl + Standing Calf Raise','Lying Leg Curl + Seated Calf Raise'],cue:'Full range both'},
   {t:'iso',pool:['Cable Crunch','Dead Bug ×12','Pallof Press'],cue:'Core finisher'}],
  fin:{name:'Optional glute burnout',desc:'Banded glute bridge ×25 + pulses ×15, 2 rounds',swaps:''}},
 {id:'hup',title:'Upper — Push & Pull',dur:'50 min',lower:false,
  warm:'3 min row · band pull-aparts ×15 · arm circles · ramp-ups',
  work:[
   {t:'main',pool:['Machine Chest Press','Flat DB Bench Press','Incline DB Press','Push-up'],cue:'Full range, controlled'},
   {t:'acc',pool:['Lat Pulldown','Assisted Pull-up','Neutral-Grip Pulldown'],cue:'Elbows down, chest tall'},
   {t:'acc',pool:['Seated Cable Row','Machine Row','1-Arm DB Row'],cue:'Squeeze shoulder blades'},
   {t:'ss',pool:['Seated DB Shoulder Press + Lateral Raise','Machine Shoulder Press + Cable Lateral Raise'],cue:'Delts love volume'},
   {t:'ss',pool:['Cable Curl + Rope Pressdown','DB Curl + Overhead Extension'],cue:'No swinging'},
   {t:'iso',pool:['Face Pull','Reverse Pec Deck','Rear-Delt Raise'],cue:'Posture + shoulder health'}],
  fin:{name:'Finisher',desc:'2 min plank accumulation (break as needed)',swaps:''}},
 {id:'hlo2',title:'Lower B — Quads & Shape',dur:'50 min',lower:true,
  warm:'3 min bike · 10 squats · leg swings ×10/side · ramp-ups',
  work:[
   {t:'main',pool:['Leg Press','Smith Squat','Goblet Squat','Hack Squat'],cue:'Full depth, knees track toes'},
   {t:'acc',pool:['Leg Extension','Sissy Squat (assisted)'],cue:'2s squeeze at top'},
   {t:'acc',pool:['Curtsy Lunge','Single-Leg Press','Reverse Lunge'],cue:'Slow eccentric'},
   {t:'acc',pool:['Cable Kickback','Glute Kickback Machine','Single-Leg Hip Thrust'],cue:'Squeeze, don’t swing'},
   {t:'ss',pool:['Adductor + Abductor Machines','Banded Side Steps + Sumo Squat Hold'],cue:'Inner + outer pair'},
   {t:'ss',pool:['Standing Calf Raise + Hanging Knee Raise','Seated Calf Raise + Cable Crunch'],cue:'Calves + core'}],
  fin:{name:'Optional',desc:'10-min incline walk',swaps:''}},
 {id:'heng',title:'Engine — Conditioning & Core',dur:'45 min',lower:false,
  warm:'5 min easy',
  work:[
   {t:'main',pool:['Zone 2 — 30 min','Intervals: 1 min brisk / 2 min easy ×8'],cue:'Conversational pace for Z2'},
   {t:'ss',pool:['Core Circuit ×3'],cue:'Dead bug ×10 · side plank 30s/side · glute bridge ×15'},
   {t:'iso',pool:['Mobility — 8 min'],cue:'Hip flexor · 90/90 · figure-4 · child’s pose'}],
  fin:{name:'',desc:'',swaps:''}}
];
function mySessions(){return prof==='her'?SESSIONS_HER:SESSIONS}
function myRot(){return prof==='her'?ROT_HER:ROT}

/* ============ HEALTH METRICS / AUTO-READINESS (Brian's watch) ============ */
function metrics(){return S.get('mx',{})}
function saveMetric(dk,k,v){const m=metrics();m[dk]=m[dk]||{};if(v==='')delete m[dk][k];else m[dk][k]=parseFloat(v);S.set('mx',m)}
function baseline(key,excl){
 const m=metrics();const ks=Object.keys(m).filter(d=>d!==excl&&m[d][key]!=null).sort().slice(-14);
 if(ks.length<3)return null;
 const vals=ks.map(d=>m[d][key]).sort((a,b)=>a-b);
 return vals[Math.floor(vals.length/2)];
}
function readiness(){
 const dk=todayKey(),reasons=[];let flags=0,dataUsed=false;
 if(prof==='me'){
  const m=metrics()[dk]||{};
  const bR=baseline('rhr',dk),bH=baseline('hrv',dk);
  if(m.rhr!=null&&bR!=null){dataUsed=true;if(m.rhr>=bR+5){flags++;reasons.push('RHR '+m.rhr+' vs '+bR+' baseline')}}
  if(m.hrv!=null&&bH!=null){dataUsed=true;if(m.hrv<=bH*0.8){flags++;reasons.push('HRV '+m.hrv+' vs '+bH)}}
  if(m.sleep!=null){dataUsed=true;if(m.sleep<6.5){flags++;reasons.push('Sleep '+m.sleep+'h')}}
  if(m.energy!=null){dataUsed=true;if(m.energy<=2){flags++;reasons.push('Energy '+m.energy+'/5')}}
 }
 if(!dataUsed){
  const r=S.get(P()+'ready',null);
  if(!r)return{st:'n',reasons:['Tap readiness below or sync Data'],manual:true};
  const sc=r.s+r.e+r.m;
  return{st:sc>=5?'g':sc>=3?'a':'r',reasons:['Manual readiness'],manual:true};
 }
 return{st:flags===0?'g':flags===1?'a':'r',reasons:reasons.length?reasons:['All markers near baseline'],manual:false};
}
const READLINE={g:'GREEN — full session, chase the targets.',a:'AMBER — 1 set trimmed everywhere, finisher off, cap RIR 2–3.',r:'RED — home Recovery Flow or full rest. Shrink, don’t skip.',n:'No readiness data yet.'};

/* ============ SCHEDULER ============ */
function hist(){return S.get(P()+'hist',[])}
function logSession(id,dk){const h=hist();h.unshift({id,d:dk||todayKey()});S.set(P()+'hist',h.slice(0,400));render()}
function undoLast(){const h=hist();h.shift();S.set(P()+'hist',h);render()}
function lastRotEntry(){return hist().find(x=>myRot().includes(x.id))}
function nextSession(){
 const rot=myRot(),last=lastRotEntry();
 if(!last)return{id:rot[0],note:''};
 const gap=Math.floor((new Date(todayKey()+'T12:00')-new Date(last.d+'T12:00'))/864e5);
 const nid=rot[(rot.indexOf(last.id)+1)%rot.length];
 let note='';
 if(gap>=14)note='14+ days off → restart block at week-1 loads.';
 else if(gap>=7)note='7+ days off → −10% loads today.';
 const nx=mySessions().find(s=>s.id===nid);
 if(nx.lower&&mySessions().find(s=>s.id===last.id).lower&&gap<2)note='Lower <48h ago — do Upper or Engine today.';
 return{id:nid,note};
}
function doneToday(){return hist().filter(x=>x.d===todayKey())}
function weekSessions(){
 const now=new Date(todayKey()+'T12:00');const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
 return hist().filter(x=>new Date(x.d+'T12:00')>=mon&&myRot().includes(x.id)).length;
}

/* ============ SET LOGGING & LOAD SUGGESTION (keyed by exercise name) ============ */
function slKey(name){return 'sl_'+P()+slug(name)}
function setLog(name){return S.get(slKey(name),null)}
function saveSet(name,si,field,val){
 const key=slKey(name);let o=S.get(key,null);const tk=todayKey();
 if(!o)o={d:tk,sets:[],prev:null};
 if(o.d!==tk){o={d:tk,sets:[],prev:{d:o.d,sets:o.sets}}}
 o.sets[si]=o.sets[si]||{};o.sets[si][field]=val;S.set(key,o);

function ideasFor(day){
 const c=ctx();let ks=[];
 if(c.hot)ks.push('hot');

function foodView(){

 const alcW=weekAlc(),c=ctx();
 const kpi=(label,v,tg,inv)=>{
  const pct=Math.min(100,Math.round(100*v/tg));

  return `<div class="kpi"><div class="v ${cls}">${v}<span class="dim" style="font-size:10px">/${tg}</span></div><div class="k">${label}</div><div class="bar"><i class="${inv&&v>tg?'over':''}" style="width:${pct}%"></i></div></div>`;
 };
 const ideaBlocks=ideasFor(day).map(k=>{
  const title={train:'Trained today',rest:'Rest day',drink:'Drinking day',hol:'Holiday mode',hot:'Hot climate'}[k];
  return `<h3>${title}</h3><ul class="small">${IDEAS[k].map(x=>`<li>${x}</li>`).join('')}</ul>`;
 }).join('');
 return `
 <div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
  <button class="btn2" onclick="shiftFoodDate(-1)">‹</button>

  <div class="grid2" style="margin-top:9px">${kpi('kcal',tot.k,t.kcal,true)}${kpi('protein g',tot.p,t.p,false)}</div>
  <div class="grid2" style="margin-top:7px">${kpi('carbs g',tot.c,t.c,true)}${kpi('fat g',tot.f,t.f,true)}</div></div>
 <div class="card"><h2>Add food</h2>
  <input type="text" placeholder="Search… (chicken, pint, kebab)" value="${foodQ}" oninput="foodQ=this.value;fres()">

   <input type="text" id="cf_n" placeholder="Name"><div class="grid2" style="margin-top:6px"><input type="number" id="cf_k" placeholder="kcal"><input type="number" id="cf_p" placeholder="protein g"></div>
   <div class="grid2" style="margin-top:6px"><input type="number" id="cf_c" placeholder="carbs g"><input type="number" id="cf_f" placeholder="fat g"></div>
   <div style="margin-top:7px"><button class="btn2" onclick="addCustom()">Add</button></div></details></div>
 <div class="card">${day.items.map((it,i)=>`<div class="fentry"><span>${it.a?'🍷 ':''}${it.n}</span><span class="dim small">${it.k} · ${it.p}P <button class="btn3" onclick="delFood(${i})">×</button></span></div>`).join('')||'<p class="dim small">Nothing logged yet.</p>'}</div>
 <div class="card"><h2>What to eat — ideas for today</h2>${ideaBlocks}</div>
 ${c.hot?HOTCARD:''}
 <div class="card"><h2>Week’s alcohol</h2><p><b style="color:${alcW>1500?'var(--red)':alcW>700?'var(--amb)':'var(--grn)'}">${alcW} kcal</b> <span class="dim small">Mon–today. Every 700 kcal shaved ≈ 0.1 kg fat that never arrives.</span></p></div>
 <details class="card" style="display:block"><summary>Timing, hydration, weekend rules, monthly adjustments</summary>
 <h3>Timing</h3><ul class="small"><li>Pre-gym 60–90 min: carbs + protein</li><li>Post: 40 g protein + carbs within ~2h</li><li>4 protein feeds/day beats 2</li><li>Friday: 50 g protein before first drink</li><li>Drinking bedtime: water + electrolytes + yoghurt</li></ul>
 <h3>Hydration</h3><p class="small">2.5–3 L floor, +500 ml training. Drinking: 1 water per 2 drinks, electrolytes at bed + waking.</p>
 <h3>Weekend design</h3><p class="small">Lifting lives Mon–Thu · Fri rest + protein dinner · Sat hangover-proof Engine · Sun 8k steps + early night.</p>
 <h3>Monthly rules</h3><table><tr><td>Waist ↓, weight flat</td><td>Perfect — change nothing</td></tr><tr><td>Weight & waist ↑ 2wks</td><td>−150 kcal Mon–Thu carbs</td></tr><tr><td>Weight ↓ >0.7 kg/wk or lifts drop</td><td>+150–200 kcal carbs</td></tr><tr><td>Stalled 3+ wks</td><td>The drinks are the honest place to look</td></tr></table>
 <h3>Getting properly cut</h3><p class="small">Visible definition ≈ 12–15% BF, abs 10–12%. Recomp + current weekends: leaner in 12 wks, cut in ~a year. Cut mode + weekends halved: cut in 16–20 wks. Hard cut + current weekends: mathematically cancels — not offered.</p></details>`;
}

function importCSV(){
 const lines=el('csvBox').value.split('\n');let n=0;
 lines.forEach(L=>{

   if(p[1])saveMetric(dk,'rhr',p[1]);if(p[2])saveMetric(dk,'hrv',p[2]);if(p[3])saveMetric(dk,'sleep',p[3]);n++;
  }});
 el('csvMsg').textContent=n+' days imported';setTimeout(render,600);
}

function backupText(){

}
function doBackup(){el('bkBox').value=backupText();el('bkBox').select();try{document.execCommand('copy');el('bkMsg').textContent='Copied — paste somewhere safe (Notes)'}catch(e){el('bkMsg').textContent='Select-all and copy manually'}}

}

 ${EDGE}

 <div class="card"><h2>Danger zone</h2><button class="btn2" style="color:var(--red)" onclick="if(confirm('Erase ALL data (both profiles)?')){localStorage.clear();location.reload()}">Reset all data</button></div>`;

/* ---- TIMER ---- */
let tInt=null;
function startTimer(sec){
 clearInterval(tInt);el('timer').classList.remove('hide');
 const end=Date.now()+sec*1000;
 const tick=()=>{const left=Math.max(0,Math.round((end-Date.now())/1000));
  el('timerBox').textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
  if(left<=0){clearInterval(tInt);el('timerBox').textContent='GO ✓';beep();setTimeout(()=>el('timer').classList.add('hide'),2500)}};
 tick();tInt=setInterval(tick,250);
}
function stopTimer(){clearInterval(tInt);el('timer').classList.add('hide')}
function beep(){try{const c=new (window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,c.currentTime);o.start();o.stop(c.currentTime+.35)}catch(e){}}

/* ---- URL SYNC (iOS Shortcut) ---- */
(function(){try{
 const src=(location.search&&location.search.length>1)?location.search:(location.hash&&location.hash.indexOf('=')>-1?'?'+location.hash.slice(1):'');
 if(!src)return;
 const q=new URLSearchParams(src);
 const dk=(q.get('d')||todayKey()).slice(0,10);let got=[];
 [['rhr',30,120],['hrv',5,250],['sleep',0,16],['energy',1,5],['wt',40,200],['waist',50,200]].forEach(([k,lo,hi])=>{
  const v=parseFloat(q.get(k));
  if(!isNaN(v)&&v>=lo&&v<=hi){saveMetric(dk,k,String(Math.round(v*10)/10));got.push(k.toUpperCase()+' '+(Math.round(v*10)/10))}
 });
 if(got.length){S.set('lastSync',dk+' — '+got.join(' · '));tab='today';S.set('tab','today');
  try{history.replaceState(null,'',location.pathname)}catch(e){}}
}catch(e){}})();
