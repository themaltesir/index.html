<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Recomp43</title>
<style>
:root{--bg:#0e1116;--card:#171c24;--card2:#1e2530;--line:#2a3342;--txt:#e8edf4;--dim:#8b97a8;--acc:#4fc3f7;--grn:#5dd39e;--amb:#ffc766;--red:#ff7a7a;--pink:#f48fb1;--pur:#b39ddb}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;padding-bottom:80px}
header{position:sticky;top:0;z-index:10;background:rgba(14,17,22,.95);backdrop-filter:blur(8px);padding:12px 16px 8px;border-bottom:1px solid var(--line)}
header h1{font-size:17px;letter-spacing:.5px}
header h1 span{color:var(--acc)}
.sub{color:var(--dim);font-size:12px}
main{padding:14px 14px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.card h2{font-size:15px;margin-bottom:8px;color:var(--acc)}
.card h3{font-size:13.5px;margin:10px 0 4px}
.card p{margin-bottom:8px}
.dim{color:var(--dim);font-size:13px}
.small{font-size:12.5px}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
th{color:var(--dim);text-align:left;font-weight:600;padding:5px 6px;border-bottom:1px solid var(--line)}
td{padding:6px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
.chip{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12.5px;margin:2px 4px 2px 0}
.chip.on{background:var(--acc);color:#06222e;border-color:var(--acc);font-weight:600}
.chip.pink.on{background:var(--pink);color:#3d0f22;border-color:var(--pink)}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--acc);color:#06222e;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;width:100%}
.btn2{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px}
.btn3{background:none;border:none;color:var(--red);font-size:16px;padding:2px 8px}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,17,22,.97);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20}
nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px}
nav button .ic{font-size:19px;line-height:1}
nav button.on{color:var(--acc)}
.ex{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px}
.ex .name{font-weight:600;font-size:14.5px}
.ex .scheme{color:var(--grn);font-size:12.5px;margin:3px 0}
.ex .cue{color:var(--dim);font-size:12px}
.ex .her{color:var(--pink);font-size:12px;margin-top:3px}
.ex .last{color:var(--pur);font-size:12px;margin-top:4px}
select,input[type=text],input[type=number],input[type=date],textarea{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:14px}
input[type=text],input[type=number],input[type=date],textarea{width:100%;background:var(--card2)}
label{font-size:12px;color:var(--dim);display:block;margin:8px 0 3px}
.setrow{display:flex;gap:6px;align-items:center;margin:4px 0}
.setrow input{width:70px;text-align:center;padding:6px 4px}
.setrow .sn{color:var(--dim);font-size:12px;width:38px}
.tag{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.tag.main{background:#153a52;color:var(--acc)}
.tag.acc{background:#1d3a2d;color:var(--grn)}
.tag.ss{background:#3a2d15;color:var(--amb)}
.tag.iso{background:#33202c;color:var(--pink)}
.banner{border-radius:12px;padding:12px;margin-bottom:12px;font-size:13.5px;border:1px solid}
.banner.g{background:#12261d;border-color:#1f4433;color:var(--grn)}
.banner.a{background:#2b2312;border-color:#4d3f1e;color:var(--amb)}
.banner.r{background:#2b1515;border-color:#4d2424;color:var(--red)}
.banner.n{background:#181f2b;border-color:#2a3a52;color:var(--dim)}
.timer{position:fixed;bottom:66px;left:0;right:0;text-align:center;z-index:15;pointer-events:none}
.timer .box{display:inline-block;background:var(--acc);color:#06222e;font-weight:700;font-size:22px;padding:8px 26px;border-radius:30px;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
details{margin-bottom:8px}
summary{cursor:pointer;font-weight:600;font-size:14px;padding:9px 0}
summary::marker{color:var(--acc)}
.hide{display:none!important}
ul{padding-left:18px;margin-bottom:8px}
li{margin-bottom:4px}
.kpi{background:var(--card2);border-radius:10px;padding:9px 6px;text-align:center}
.kpi .v{font-size:16px;font-weight:700;color:var(--acc)}
.kpi .v.over{color:var(--red)}
.kpi .v.good{color:var(--grn)}
.kpi .k{font-size:10px;color:var(--dim)}
.bar{height:6px;background:var(--card2);border-radius:3px;margin-top:4px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--acc);border-radius:3px}
.bar i.over{background:var(--red)}
.fresult{padding:9px 6px;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;justify-content:space-between;cursor:pointer}
.fresult .m{color:var(--dim);font-size:11.5px}
.fentry{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
hr{border:none;border-top:1px solid var(--line);margin:10px 0}
</style>
</head>
<body>
<header>
  <h1>RECOMP<span>43</span> <span class="sub" id="hdrSub"></span></h1>
  <div class="sub" id="hdrSub2">Adaptive recomposition engine</div>
</header>
<main id="main"></main>
<div class="timer hide" id="timer"><div class="box" id="timerBox" onclick="stopTimer()">0:00</div></div>
<nav id="nav"></nav>

<script>
/* ============ STORAGE ============ */
const S={
 get(k,d){try{const v=localStorage.getItem('r43_'+k);return v===null?d:JSON.parse(v)}catch(e){return d}},
 set(k,v){try{localStorage.setItem('r43_'+k,JSON.stringify(v))}catch(e){}},
 del(k){try{localStorage.removeItem('r43_'+k)}catch(e){}}
};
const todayKey=(d)=>{const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')};
const dayName=k=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(k+'T12:00').getDay()];
let tab=S.get('tab','today'), openSession=null, foodDate=todayKey(), foodQ='';

/* ============ SETTINGS ============ */
function cfg(){return S.get('cfg',{wt:86,mode:'recomp',start:'',her:false})}
function setCfg(k,v){const c=cfg();c[k]=v;S.set('cfg',c);render()}
function weekNum(){
 const c=cfg(); if(!c.start) return 1;
 const d=Math.floor((new Date(todayKey()+'T12:00')-new Date(c.start+'T12:00'))/864e5);
 return Math.min(12,Math.max(1,Math.floor(d/7)+1));
}
function curBlock(){const w=weekNum();return w<=4?'b1':w<=8?'b2':'b3'}
function isConsol(){return weekNum()%4===0}

/* ============ PERIODISATION ============ */
const BLOCKS={
 b1:{name:'Block 1 · Foundation',wks:'Weeks 1–4',
  sch:{main:{sets:4,txt:'6–8 reps · RIR 2 · rest 2–3 min · 3s eccentric'},acc:{sets:3,txt:'8–12 reps · RIR 1–2 · rest 60–90s · controlled'},ss:{sets:3,txt:'10–15 reps · RIR 1 · superset, rest 60s after pair'},iso:{sets:2,txt:'12–15 reps · RIR 0–1 · rest 45s'}},
  goal:'Re-establish technique, full range, controlled tempo. The slow eccentric is the stimulus — most long-time lifters have never trained slow lowering seriously.',
  cond:'Engine day = steady Zone 2 only. Build the aerobic base.'},
 b2:{name:'Block 2 · Intensification',wks:'Weeks 5–8',
  sch:{main:{sets:5,txt:'4–6 reps · RIR 2 · rest 3 min · drive up fast'},acc:{sets:3,txt:'6–10 reps · RIR 1–2 · rest 90s'},ss:{sets:3,txt:'8–12 reps · RIR 1 · last set = drop set (−30%, to RIR 0)'},iso:{sets:2,txt:'10–12 reps · RIR 0 + drop set on final set'}},
  goal:'Heavier loads, more rest, explosive intent. New strength = new hypertrophy headroom. Rotate 1–2 exercise swaps from Block 1.',
  cond:'Engine alternates: Zone 2 one week, Norwegian 4×4 the next (green days only).'},
 b3:{name:'Block 3 · Definition',wks:'Weeks 9–12',
  sch:{main:{sets:4,txt:'8–10 reps · RIR 1 · rest 2 min · 1s pause in stretch'},acc:{sets:3,txt:'10–15 reps · RIR 1 · rest 60s'},ss:{sets:3,txt:'12–15 reps · RIR 0–1 · rest 45s after pair'},iso:{sets:3,txt:'15–20 reps · RIR 0 · rest 30s · chase the pump'}},
  goal:'Shorter rests, stretch pauses, higher density. With the nutrition plan, this is the visible-definition block. Rotate swaps again.',
  cond:'Engine: 4×4 weekly if green + one extra 30-min Zone 2 midweek.'}
};
const CONSOL='Consolidation week: −1 set on everything, RIR 3, no finishers, same loads. Planned recovery is what lets the next block progress.';
const PROGRESSION=[
 ['Double progression','Work within the rep range. Hit the TOP of the range on ALL sets at prescribed RIR → add weight next time (+2.5 kg upper / +5 kg lower or next DB) and rebuild from the bottom.'],
 ['RIR honesty','RIR 2 = two more clean reps in the tank, no grinding. Plateaued veterans usually train at RIR 4 believing it’s RIR 1. Film a top set; if bar speed never slows, you’re sandbagging.'],
 ['Beat the logbook','Purple line under each exercise = last session. Beat it by a rep or 2.5 kg. That’s the entire game.'],
 ['Rotate, don’t shuffle','Same movement SLOTS all 12 weeks; swap the exercise filling a slot at block changes via the swap menu. Novelty without losing tracking.'],
 ['Auto-deload','The app ambers/reds your day automatically from your Data entries (RHR up, HRV down, short sleep). Two amber days running → treat the week as consolidation.'],
 ['Missed sessions','Rotation-based: nothing is “missed”, the next session in rotation is simply next. 7+ days gap → −10% loads for one session. 14+ days → restart current block week 1.']
];

/* ============ SESSIONS ============ */
const ROT=['upA','loA','upB','eng'];
const SESSIONS=[
 {id:'upA',title:'Upper A — Chest & Back',dur:'55 min',lower:false,
  warm:'3 min easy row/bike → band pull-aparts ×15 → cat-cow ×8 → arm circles → 2 ramp-up sets of first lift (50%, 75%)',
  work:[
   {t:'main',pool:['Flat DB Bench Press','Barbell Bench Press','Machine Chest Press','Smith Bench Press','Weighted Dip','Floor Press'],cue:'Full stretch at the bottom, don’t bounce',herN:'Same — machine press is a great option'},
   {t:'acc',pool:['Chest-Supported Row','Seated Cable Row','Machine Row','1-Arm DB Row','Barbell Row','T-Bar Row'],cue:'Pause 1s at chest, control the lower',herN:'Same'},
   {t:'acc',pool:['Incline Machine Press','Incline DB Press','Pec Deck','Weighted Push-up','Low-to-High Cable Fly','Incline Smith Press'],cue:'Upper-chest focus, 30–45°',herN:'Same'},
   {t:'acc',pool:['Lat Pulldown','Pull-up','Neutral-Grip Pulldown','1-Arm Cable Pulldown','Straight-Arm Pulldown','Chin-up'],cue:'Elbows down, chest tall',herN:'Same'},
   {t:'ss',pool:['Cable Lateral Raise + Face Pull','DB Lateral Raise + Reverse Pec Deck','Machine Lateral Raise + Cable Rear-Delt Fly'],cue:'Light, perfect reps — delts respond to volume',herN:'Same'}],
  fin:{name:'Bike sprints',desc:'6 × 20s hard / 40s easy (6 min)',swaps:'Rower or ski erg'}},
 {id:'loA',title:'Lower A — Squat & Hinge',dur:'55 min',lower:true,
  warm:'3 min incline walk → 10 squats → 10 hip hinges → world’s greatest stretch ×3/side → 2 ramp-up sets',
  work:[
   {t:'main',pool:['Barbell or Smith Squat','Leg Press','Hack Squat','Heels-Elevated Goblet Squat','Front Squat','Belt Squat'],cue:'Depth over load. Own every centimetre',herN:'Goblet or Smith squat, same scheme'},
   {t:'acc',pool:['Romanian Deadlift','DB RDL','45° Back Extension','Cable Pull-Through','Hip Thrust','Good Morning (light)'],cue:'Hips back, hamstrings load, soft knees',herN:'Same, or swap to Hip Thrust'},
   {t:'acc',pool:['Bulgarian Split Squat','Walking Lunge','Leg Extension','Step-Up','Smith Reverse Lunge','Single-Leg Press'],cue:'Torso slightly forward = more glute',herN:'Hip Thrust 3×10–12 preferred fill here'},
   {t:'acc',pool:['Seated Leg Curl','Lying Leg Curl','Swiss-Ball Curl','Nordic Negatives','Glute-Ham Raise'],cue:'Seated beats lying — long muscle length',herN:'Same'},
   {t:'ss',pool:['Standing Calf Raise + Cable Crunch','Leg-Press Calves + Hanging Knee Raise','Seated Calf Raise + Ab-Wheel Rollout'],cue:'Calves: 2s stretch pause. Crunch: flex spine',herN:'Same'},
   {t:'iso',pool:['Leg Extension','Sissy Squat','Adductor Machine','Abductor Machine'],cue:'Optional quad/hip polish — skip if over 55 min',herN:'Abductor/adductor machines are a good fill here'}],
  fin:{name:'None — density day',desc:'Legs + finisher wrecks the next 48h. Optional 5-min incline-walk cooldown.',swaps:''}},
 {id:'upB',title:'Upper B — Shoulders & Arms',dur:'55 min',lower:false,
  warm:'3 min row → band dislocates ×10 → scap pull-ups ×8 → 2 ramp-up sets',
  work:[
   {t:'main',pool:['Seated DB Shoulder Press','Machine Shoulder Press','Barbell OHP','Arnold Press','Landmine Press','Smith OHP'],cue:'Elbows slightly forward, no lower-back arch',herN:'Same — machine version fine'},
   {t:'acc',pool:['Pull-up','Assisted Pull-up','Weighted Pull-up','Neutral-Grip Pulldown','Machine Pulldown','Meadows Row'],cue:'Full hang to chin over. Add weight at 3×8',herN:'Assisted pull-up machine, same scheme'},
   {t:'acc',pool:['Cable Fly','Pec Deck','DB Fly','Incline Cable Fly','Deficit Push-up AMRAP'],cue:'1s squeeze, wide stretch',herN:'Same'},
   {t:'ss',pool:['EZ-Bar Curl + Rope Pressdown','DB Curl + Bench Dips','Cable Curl + Skullcrusher'],cue:'No swinging, elbows pinned',herN:'Same, lighter'},
   {t:'ss',pool:['Incline DB Curl + Overhead Rope Extension','Hammer Curl + Close-Grip Push-up','Preacher Curl + JM Press'],cue:'Both train the stretch — that’s where growth lives',herN:'Same'},
   {t:'iso',pool:['Reverse Pec Deck','Bent-Over Rear-Delt Raise','Face Pull','Cable Rear-Delt Fly'],cue:'Rear delts = 3D shoulders from behind',herN:'Same'},
   {t:'iso',pool:['DB Shrug','Cable Shrug','Farmer Carry 3×40m','Behind-Back Smith Shrug'],cue:'Optional traps/grip — the neck-to-shoulder line sells the physique',herN:'Optional — farmer carries are excellent'}],
  fin:{name:'8-min EMOM',desc:'Odd min: 12 KB swings · even min: 8 push-ups',swaps:'Rower 8×100m on the minute'}},
 {id:'eng',title:'Engine — Conditioning, Core & Mobility',dur:'50 min',lower:false,
  warm:'5 min easy on chosen machine',
  work:[
   {t:'main',pool:['Zone 2 — 35 min','Norwegian 4×4 (green days, Blocks 2–3)'],cue:'Z2: 60–70% max HR, conversational. 4×4: 4 min RPE 8 / 3 min easy ×4',herN:'Identical, her own HR zones'},
   {t:'ss',pool:['Core Circuit ×3'],cue:'Dead bug ×10 · side plank 30s/side · Pallof press ×12',herN:'Identical'},
   {t:'iso',pool:['Mobility — 8 min'],cue:'Couch stretch 60s/side · 90/90 · t-spine opener ×8 · hamstring floss ×10',herN:'Identical'}],
  fin:{name:'Hangover rule',desc:'Drank last night? Session still happens — cap RPE 5, steady Z2 only, electrolytes + 500 ml before. Easy movement speeds recovery and protects the habit.',swaps:''}}
];
const OPTIONAL_WED='Any rest day: 20–30 min brisk walk + 10-min flow (down-dog → runner’s lunge → twist, 3 rounds/side). Active recovery, not training. In cut mode this becomes a second 30–40 min Zone 2 session.';

/* ============ HEALTH METRICS / AUTO-READINESS ============ */
function metrics(){return S.get('mx',{})}
function saveMetric(dk,k,v){const m=metrics();m[dk]=m[dk]||{};if(v==='')delete m[dk][k];else m[dk][k]=parseFloat(v);S.set('mx',m)}
function baseline(key,excl){
 const m=metrics();const ks=Object.keys(m).filter(d=>d!==excl&&m[d][key]!=null).sort().slice(-14);
 if(ks.length<3)return null;
 const vals=ks.map(d=>m[d][key]).sort((a,b)=>a-b);
 return vals[Math.floor(vals.length/2)];
}
function readiness(){
 const dk=todayKey(),m=metrics()[dk]||{},reasons=[];let flags=0,dataUsed=false;
 const bR=baseline('rhr',dk),bH=baseline('hrv',dk);
 if(m.rhr!=null&&bR!=null){dataUsed=true;if(m.rhr>=bR+5){flags++;reasons.push('Resting HR '+m.rhr+' vs baseline '+bR+' (+'+(m.rhr-bR)+')')}}
 if(m.hrv!=null&&bH!=null){dataUsed=true;if(m.hrv<=bH*0.8){flags++;reasons.push('HRV '+m.hrv+' vs baseline '+bH+' (−'+Math.round(100-100*m.hrv/bH)+'%)')}}
 if(m.sleep!=null){dataUsed=true;if(m.sleep<6.5){flags++;reasons.push('Sleep '+m.sleep+'h (<6.5h)')}}
 if(m.energy!=null){dataUsed=true;if(m.energy<=2){flags++;reasons.push('Energy '+m.energy+'/5')}}
 if(!dataUsed){
  const r=S.get('ready',null);
  if(!r)return{st:'n',reasons:['No data today — enter this morning’s numbers in Data, or tap a manual readiness below'],manual:true};
  const sc=r.s+r.e+r.m;
  return{st:sc>=5?'g':sc>=3?'a':'r',reasons:['Manual readiness (no Watch data entered today)'],manual:true};
 }
 return{st:flags===0?'g':flags===1?'a':'r',reasons:reasons.length?reasons:['All markers at/near baseline'],manual:false};
}
const READLINE={g:'GREEN — full session as written. Chase progression.',a:'AMBER — the app has cut 1 set from every exercise and removed the finisher. Cap RIR 2–3.',r:'RED — do the “Exhausted” version (More → Versions) or full rest. Shrink it, don’t skip it.',n:'No readiness data yet.'};

/* ============ SCHEDULER ============ */
function hist(){return S.get('hist',[])}
function logSession(id,dk){const h=hist();h.unshift({id,d:dk||todayKey()});S.set('hist',h.slice(0,400));render()}
function undoLast(){const h=hist();h.shift();S.set('hist',h);render()}
function nextSession(){
 const h=hist();
 if(!h.length)return{id:'upA',note:'Fresh start — Upper A opens the rotation.'};
 const last=h[0];
 const gap=Math.floor((new Date(todayKey()+'T12:00')-new Date(last.d+'T12:00'))/864e5);
 const nid=ROT[(ROT.indexOf(last.id)+1)%4];
 let note='';
 if(gap>=14)note='14+ days off → restart this block at week 1 loads.';
 else if(gap>=7)note='7+ days off → take −10% on all loads today, then resume normal progression.';
 const nx=SESSIONS.find(s=>s.id===nid);
 if(nx.lower&&SESSIONS.find(s=>s.id===last.id).lower&&gap<2)note='Lower day done <48h ago — swap to Upper A or Engine today.';
 return{id:nid,note};
}
function doneToday(){return hist().filter(x=>x.d===todayKey()).map(x=>x.id)}
function weekSessions(){
 const now=new Date(todayKey()+'T12:00');const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
 return hist().filter(x=>new Date(x.d+'T12:00')>=mon).length;
}

/* ============ NUTRITION ENGINE ============ */
const MODES={recomp:{d:350,n:'Recomposition',desc:'Slow fat loss, muscle gain. −0.2 kg/wk. Fits current weekends.'},cut:{d:500,n:'Cut',desc:'−0.4 kg/wk. Visible change monthly. Weekends make this the realistic ceiling.'},hard:{d:650,n:'Hard cut',desc:'−0.6 kg/wk. Only sustainable if weekend drinking is roughly halved — otherwise Mon–Thu becomes miserable and muscle loss risk rises.'}};
function targets(dayType){
 const c=cfg(),maint=Math.round(c.wt*30.8),def=MODES[c.mode].d;
 let kcal,fat;
 if(dayType==='drink'){kcal=maint-def-450;fat=Math.round(c.wt*0.6)}
 else if(dayType==='rest'){kcal=maint-def-150;fat=Math.round(c.wt*0.75)}
 else{kcal=maint-def;fat=Math.round(c.wt*0.75)}
 const p=Math.round(c.wt*2.1);
 const carbs=Math.max(0,Math.round((kcal-p*4-fat*9)/4));
 return{kcal,p,f:fat,c:carbs,maint};
}
/* Food DB: [name, unit('g'=per100g,'u'=per unit), kcal, P, C, F, alc?] */

function flog(){return S.get('flog',{})}
function fday(dk){const f=flog();return f[dk]||{type:defType(dk),items:[]}}
function defType(dk){const d=new Date(dk+'T12:00').getDay();return(d===5||d===6||d===0)?'drink':'train'}
function saveFday(dk,day){const f=flog();f[dk]=day;S.set('flog',f)}
function addFood(i){
 const it=FDB[i];const isG=it[1]==='g';
 const q=prompt(isG?it[0]+' — grams?':it[0]+' — how many?',isG?'100':'1');
 if(!q)return;let n=parseFloat(q);if(!n||n<=0)return;
 n=Math.min(n,isG?2000:30);
 const mult=isG?n/100:n;
 const day=fday(foodDate);
 day.items.push({n:it[0]+(isG?' '+n+'g':n>1?' ×'+n:''),k:Math.round(it[2]*mult),p:Math.round(it[3]*mult),c:Math.round(it[4]*mult),f:Math.round(it[5]*mult),a:it[6]?1:0});
 saveFday(foodDate,day);foodQ='';render();
}
function addCustom(){
 const e=id=>document.getElementById(id).value;
 const n=e('cf_n'),k=parseFloat(e('cf_k'))||0,p=parseFloat(e('cf_p'))||0,c=parseFloat(e('cf_c'))||0,f=parseFloat(e('cf_f'))||0;
 if(!n||!k)return;
 const day=fday(foodDate);day.items.push({n,k:Math.round(k),p:Math.round(p),c:Math.round(c),f:Math.round(f),a:0});
 saveFday(foodDate,day);render();
}
function delFood(idx){const day=fday(foodDate);day.items.splice(idx,1);saveFday(foodDate,day);render()}
function setDayType(t){const day=fday(foodDate);day.type=t;saveFday(foodDate,day);render()}
function shiftFoodDate(n){const d=new Date(foodDate+'T12:00');d.setDate(d.getDate()+n);foodDate=todayKey(d);render()}
function weekAlc(){
 const f=flog(),now=new Date(todayKey()+'T12:00'),mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
 let k=0;Object.keys(f).forEach(dk=>{if(new Date(dk+'T12:00')>=mon&&new Date(dk+'T12:00')<=now)f[dk].items.forEach(it=>{if(it.a)k+=it.k})});
 return k;
}

function saveSet(sid,i,si,field,val){
 const key='sl_'+exKey(sid,i);let o=S.get(key,null);const tk=todayKey();
 if(!o)o={d:tk,sets:[],prev:null};
 if(o.d!==tk){o={d:tk,sets:[],prev:{d:o.d,sets:o.sets}}}
 o.sets[si]=o.sets[si]||{};o.sets[si][field]=val;S.set(key,o);

function lastLine(o){
 if(!o)return'';
 const src=(o.d!==todayKey())?o:(o.prev);
 if(!src||!src.sets||!src.sets.length)return'';
 const txt=src.sets.filter(s=>s&&(s.w||s.r)).map(s=>(s.w||'?')+'×'+(s.r||'?')).join(' · ');
 return txt?`<div class="last">Last (${dayName(src.d)} ${src.d.slice(5)}): ${txt} — beat it by a rep or +2.5 kg</div>`:'';
}

 </div>`;
}
function sessView(sess){
 const rd=readiness();
 return `<button class="btn2" onclick="openSession=null;render()">← Sessions</button>
 <div class="banner ${rd.st}" style="margin-top:10px">${READLINE[rd.st]}</div>
 <div class="card"><h2>${sess.title}</h2><p class="dim small">${sess.dur} · Week ${weekNum()} · ${BLOCKS[curBlock()].name}${isConsol()?' · CONSOLIDATION':''}</p>
 <h3>Warm-up (5–8 min)</h3><p class="small">${sess.warm}</p></div>
 ${sess.work.map((ex,i)=>exCard(sess,ex,i)).join('')}
 <div class="card"><h3>Finisher — ${sess.fin.name}</h3>
 ${skipFin()&&sess.fin.swaps!==''?`<p class="small" style="color:var(--amb)">Auto-removed today (${isConsol()?'consolidation week':'readiness'}). Go home.</p>`:`<p class="small">${sess.fin.desc}</p>${sess.fin.swaps?`<p class="dim small">Swap: ${sess.fin.swaps}</p>`:''}`}</div>
 <div class="card"><h3>Rest timer</h3><div class="row">${[60,90,120,180].map(s=>`<button class="btn2" onclick="startTimer(${s})">${s<120?s+'s':(s/60)+' min'}</button>`).join('')}</div></div>
 <button class="btn" onclick="logSession('${sess.id}')">✓ Session done — log it</button>`;
}
function trainView(){
 if(openSession){const s=SESSIONS.find(x=>x.id===openSession);if(s)return sessView(s)}
 const c=cfg(),nx=nextSession();
 return `<div style="margin-bottom:10px"><span class="chip on">Week ${weekNum()} · ${BLOCKS[curBlock()].wks}</span>
 <span class="chip pink ${c.her?'on':''}" onclick="setCfg('her',${!c.her})" style="float:right">Her ${c.her?'ON':'off'}</span></div>
 ${SESSIONS.map(s=>`<div class="card" onclick="openSess('${s.id}')" style="cursor:pointer"><b>${s.title}</b> <span class="dim small">· ${s.dur} ${s.id===nx.id?'· <span style="color:var(--grn)">next up</span>':''} ›</span></div>`).join('')}
 <div class="card"><p class="small">${OPTIONAL_WED}</p></div>
 <div class="card"><h2>Rotation history</h2>${hist().slice(0,10).map(h=>`<p class="small" style="margin-bottom:3px">${dayName(h.d)} ${h.d.slice(5)} — ${SESSIONS.find(s=>s.id===h.id).title.split('—')[0]}</p>`).join('')||'<p class="dim small">Nothing logged yet.</p>'}</div>
 <div class="card"><h2>Progression & adaptation rules</h2>${PROGRESSION.map(p=>`<h3>${p[0]}</h3><p class="small">${p[1]}</p>`).join('')}</div>
 <div class="card"><h2>Consolidation weeks (4 · 8 · 12)</h2><p class="small">${CONSOL} The app applies this automatically from your start date (Settings in More).</p></div>`;
}

/* ---- FOOD ---- */
function fresHTML(){
 const results=foodQ.length>=2?FDB.map((f,i)=>[f,i]).filter(x=>x[0][0].toLowerCase().includes(foodQ.toLowerCase())).slice(0,8):[];
 return results.map(([f,i])=>`<div class="fresult" onclick="addFood(${i})"><span>${f[0]}${f[6]?' 🍷':''}</span><span class="m">${f[2]} kcal · ${f[3]}P ${f[1]==='g'?'/100g':'/each'}</span></div>`).join('');
}
function fres(){el('fres').innerHTML=fresHTML()}
function foodView(){
 const day=fday(foodDate),t=targets(day.type);
 const tot=day.items.reduce((a,it)=>({k:a.k+it.k,p:a.p+it.p,c:a.c+it.c,f:a.f+it.f}),{k:0,p:0,c:0,f:0});
 const alcW=weekAlc();
 const kpi=(label,v,tg,inv)=>{
  const pct=Math.min(100,Math.round(100*v/tg));
  const cls=inv?(v>tg?'over':''):(v>=tg?'good':'');
  return `<div class="kpi"><div class="v ${cls}">${v}<span class="dim" style="font-size:10px">/${tg}</span></div><div class="k">${label}</div><div class="bar"><i class="${inv&&v>tg?'over':''}" style="width:${pct}%"></i></div></div>`;
 };
 return `
 <div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
  <button class="btn2" onclick="shiftFoodDate(-1)">‹</button>
  <b>${foodDate===todayKey()?'Today':dayName(foodDate)+' '+foodDate.slice(5)}</b>
  <button class="btn2" onclick="shiftFoodDate(1)">›</button></div>
  <div style="margin-top:8px">${[['train','Training'],['rest','Rest'],['drink','Drinking']].map(x=>`<span class="chip ${day.type===x[0]?'on':''}" onclick="setDayType('${x[0]}')">${x[1]}</span>`).join('')}</div>
  <div class="grid2" style="margin-top:10px">${kpi('kcal',tot.k,t.kcal,true)}${kpi('protein g',tot.p,t.p,false)}</div>
  <div class="grid2" style="margin-top:8px">${kpi('carbs g',tot.c,t.c,true)}${kpi('fat g',tot.f,t.f,true)}</div>
  ${day.type==='drink'?'<p class="dim small" style="margin-top:8px">Targets are food-only — drinks land on top; the point is protecting protein and capping fat while alcohol is in the system.</p>':''}</div>
 <div class="card"><h2>Add food</h2>
  <input type="text" placeholder="Search 90+ foods… (chicken, pint, kebab)" value="${foodQ}" oninput="foodQ=this.value;fres()">
  <div id="fres">${fresHTML()}</div>
  <details><summary class="small" style="color:var(--dim)">Custom entry</summary>
   <input type="text" id="cf_n" placeholder="Name"><div class="grid2" style="margin-top:6px"><input type="number" id="cf_k" placeholder="kcal"><input type="number" id="cf_p" placeholder="protein g"></div>
   <div class="grid2" style="margin-top:6px"><input type="number" id="cf_c" placeholder="carbs g"><input type="number" id="cf_f" placeholder="fat g"></div>
   <div style="margin-top:8px"><button class="btn2" onclick="addCustom()">Add</button></div></details></div>
 <div class="card"><h2>Logged</h2>${day.items.map((it,i)=>`<div class="fentry"><span>${it.a?'🍷 ':''}${it.n}</span><span class="dim small">${it.k} · ${it.p}P <button class="btn3" onclick="delFood(${i})">×</button></span></div>`).join('')||'<p class="dim small">Nothing yet.</p>'}</div>
 <div class="card"><h2>This week’s alcohol</h2><p><b style="color:${alcW>1500?'var(--red)':alcW>700?'var(--amb)':'var(--grn)'}">${alcW} kcal</b> <span class="dim small">logged Mon–today. Your historical norm ≈ 2,600/wk. Every 700 kcal you shave ≈ 0.1 kg of fat that never arrives.</span></p></div>
 ${CUTCARD}${FUELSTATIC}`;
}

/* ---- DATA ---- */
function dataView(){
 const dk=todayKey(),m=metrics(),tm=m[dk]||{};
 const fields=[['rhr','Resting HR','52'],['hrv','HRV ms','45'],['sleep','Sleep h','7.2'],['energy','Energy 1–5','3'],['wt','Weight kg','86.0'],['waist','Waist cm','92']];
 const days=Object.keys(m).sort().reverse().slice(0,14);
 const bl=k=>baseline(k,dk);
 return `
 ${S.get('lastSync','')?`<div class="banner g">✓ Auto-synced from Apple Health: ${S.get('lastSync','')}</div>`:''}
 ${S.get('syncWarn','')?`<div class="banner a">${S.get('syncWarn','')}</div>`:''}
 ${S.get('lastSyncAttempt','')?`<div class="card"><h2>Last sync attempt</h2><p class="dim small">${S.get('lastSyncAttempt','')}</p></div>`:''}
 <div class="card"><h2>Automatic sync from Apple Health</h2>
  <p class="small">A web app can’t read HealthKit directly — but an iPhone <b>Shortcut</b> can push your data in with one tap, or fully automatically every morning. HRV is optional: if Apple Health has no HRV SDNN samples, leave it out rather than estimating it from heart rate.</p>
  <ol class="small" style="padding-left:18px">
   <li>Shortcuts app → <b>+</b> → name it “Sync Recomp43”.</li>
   <li>Add action <b>Find Health Samples</b> → type: <b>Resting Heart Rate</b>, sorted Latest, limit 1.</li>
   <li>Add <b>Find Health Samples</b> again → <b>Sleep</b>, <b>End Date</b> in the last 1 day, get <b>duration in hours</b>.</li>
   <li>Add <b>Open URLs</b> with:<br><span style="color:var(--acc)">https://themaltesir.github.io/index.html/?sync=1&amp;rhr=</span>[Resting HR]<span style="color:var(--acc)">&amp;sleep=</span>[Sleep hours]<br>(tap each [ ] and insert the magic variable from the matching step)</li>
   <li>Optional: if Health has <b>Heart Rate Variability SDNN</b>, add it as <span style="color:var(--acc)">&hrv=</span>[HRV].</li>
   <li>Fully automatic: Shortcuts → Automation → Time of Day 08:00 → Run Shortcut → turn OFF “Ask Before Running”.</li>
  </ol>
  <p class="dim small">The app reads the URL, logs today’s numbers, sets your readiness and cleans the address bar. Weight/waist still get typed in — scales don’t talk to Shortcuts.</p></div>
 <div class="card"><h2>This morning (or manual entry, 30 seconds)</h2>
  <p class="dim small">From Apple Watch: Health app → Browse → Heart / Sleep. Enter what you have; the app learns your 14-day baselines and auto-adjusts today’s training.</p>
  <div class="grid3">${fields.map(f=>`<div><label>${f[0]==='rhr'?'Resting HR':f[1]}</label><input type="number" inputmode="decimal" placeholder="${f[2]}" value="${tm[f[0]]??''}" onchange="saveMetric('${dk}','${f[0]}',this.value);render()"></div>`).join('')}</div>
  <p class="dim small" style="margin-top:8px">Baselines so far: RHR ${bl('rhr')??'—'} · HRV ${bl('hrv')??'—'} (optional) · needs 3+ days of entries to activate auto-readiness.</p></div>
 <div class="card"><h2>History</h2><table><tr><th>Date</th><th>RHR</th><th>HRV</th><th>Slp</th><th>E</th><th>Wt</th><th>Waist</th></tr>
 ${days.map(d=>`<tr><td>${dayName(d)} ${d.slice(5)}</td><td>${m[d].rhr??''}</td><td>${m[d].hrv??''}</td><td>${m[d].sleep??''}</td><td>${m[d].energy??''}</td><td>${m[d].wt??''}</td><td>${m[d].waist??''}</td></tr>`).join('')}</table>
 ${days.length?'':'<p class="dim small">No entries yet.</p>'}</div>
 <div class="card"><h2>Bulk import (optional)</h2><p class="dim small">Paste CSV lines: <b>date,rhr,hrv,sleep</b> e.g. 2026-07-01,52,48,7.2 — works with Health Auto Export app output trimmed to those columns.</p>
 <textarea id="csvBox" rows="3" placeholder="2026-07-01,52,48,7.2"></textarea>
 <div style="margin-top:8px"><button class="btn2" onclick="importCSV()">Import</button> <span class="dim small" id="csvMsg"></span></div></div>
 <div class="card"><h2>How each metric drives the plan</h2><table><tr><th>Metric</th><th>Rule</th></tr>${HEALTHDATA.map(h=>`<tr><td>${h[0]}</td><td>${h[1]}</td></tr>`).join('')}</table>
 <p class="dim small" style="margin-top:6px">HR zones (est. max 177): Z1 &lt;106 · <b>Z2 106–124</b> · Z3 124–142 · Z4 142–159 · Z5 159+. Record lifting as “Traditional Strength Training” and Engine as “Indoor Cycle”/“Walk” on the Watch so VO₂ stays accurate.</p></div>
 <div class="card"><h2>12-week roadmap</h2><table><tr><th>Wk</th><th>Focus</th></tr>${ROADMAP.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table></div>`;
}
function importCSV(){
 const lines=el('csvBox').value.split('\n');let n=0;
 lines.forEach(L=>{
  const p=L.trim().split(',');
  if(p.length>=2&&/^\d{4}-\d{2}-\d{2}/.test(p[0])){
   const dk=p[0].slice(0,10);
   if(p[1])saveMetric(dk,'rhr',p[1]);if(p[2])saveMetric(dk,'hrv',p[2]);if(p[3])saveMetric(dk,'sleep',p[3]);n++;
  }});
 el('csvMsg').textContent=n+' days imported';setTimeout(render,600);
}

/* ---- MORE ---- */
function moreView(){
 const c=cfg();
 return `
 <div class="card"><h2>Settings</h2>
  <label>Body weight (kg) — drives calorie & protein targets</label><input type="number" value="${c.wt}" onchange="setCfg('wt',parseFloat(this.value)||86)">
  <label>Goal mode</label>${Object.keys(MODES).map(k=>`<span class="chip ${c.mode===k?'on':''}" onclick="setCfg('mode','${k}')">${MODES[k].n}</span>`).join('')}
  <p class="dim small" style="margin-top:4px">${MODES[c.mode].desc}</p>
  <label>Programme start date (Monday) — auto-computes week, block & consolidation</label><input type="date" value="${c.start}" onchange="setCfg('start',this.value)">
  <p class="dim small">Currently: Week ${weekNum()} · ${BLOCKS[curBlock()].name}${isConsol()?' · consolidation':''}</p></div>
 <div class="card"><h2>Versions — switch any day</h2>${VERSIONS.map(v=>`<details><summary>${v[0]}</summary>${v[1]}</details>`).join('')}</div>
 ${EDGE}
 <div class="card"><h2>Weekly check-in (Sunday, 2 min)</h2><p class="small">Weight & waist go in Data. Ask yourself: sessions done vs 4? Energy trend? Drinks vs plan? Anything you dread doing? → Rotate it out via its swap menu. The monthly rules on the Food tab tell you what to change.</p></div>
 <div class="card"><h2>Danger zone</h2><button class="btn2" style="color:var(--red)" onclick="if(confirm('Erase ALL logged data?')){localStorage.clear();location.reload()}">Reset all data</button></div>`;
}

/* ---- TIMER ---- */
let tInt=null;
function startTimer(sec){
 clearInterval(tInt);el('timer').classList.remove('hide');
 const end=Date.now()+sec*1000;
 const tick=()=>{const left=Math.max(0,Math.round((end-Date.now())/1000));
  el('timerBox').textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
  if(left<=0){clearInterval(tInt);el('timerBox').textContent='GO ✓';beep();setTimeout(()=>el('timer').classList.add('hide'),2500)}};
 tick();tInt=setInterval(tick,250);
}
function stopTimer(){clearInterval(tInt);el('timer').classList.add('hide')}
function beep(){try{const c=new (window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,c.currentTime);o.start();o.stop(c.currentTime+.35)}catch(e){}}

/* ---- URL SYNC (Apple Health via iOS Shortcut) ---- */
(function(){try{
 const src=(location.search&&location.search.length>1)?location.search:(location.hash&&location.hash.indexOf('=')>-1?'?'+location.hash.slice(1):'');
 if(!src)return;
 const q=new URLSearchParams(src);
 const dk=(q.get('d')||todayKey()).slice(0,10), checked=['rhr','sleep','hrv'];let got=[],issues=[];
  [['rhr',30,120],['hrv',5,250],['sleep',0,16],['energy',1,5],['wt',40,200],['waist',50,200]].forEach(([k,lo,hi])=>{
  const v=parseFloat(q.get(k));
  if(!isNaN(v)&&v>=lo&&v<=hi){saveMetric(dk,k,String(Math.round(v*10)/10));got.push(k.toUpperCase()+' '+(Math.round(v*10)/10))}
 });
 checked.forEach(k=>{if(q.has(k)&&!got.some(g=>g.startsWith(k.toUpperCase()+' ')))issues.push(k.toUpperCase()+' was blank or invalid')});
 S.set('lastSyncAttempt',dk+' — accepted: '+(got.length?got.join(' · '):'none')+(issues.length?' — check: '+issues.join(' · '):''));
 if(got.length){S.set('lastSync',dk+' — '+got.join(' · '));S.del('syncWarn')}
 else{S.set('syncWarn','Sync opened, but no valid numbers were received from the shortcut. Check Health permissions for Shortcuts in the Health app.')}
 tab='data';S.set('tab','data');
 try{history.replaceState(null,'',location.pathname)}catch(e){}
}catch(e){}})();

/* ---- ROOT ---- */
function render(){
 nav();
 el('hdrSub').textContent='· Wk '+weekNum();
 el('hdrSub2').textContent=BLOCKS[curBlock()].name+(isConsol()?' · consolidation':'')+' · '+MODES[cfg().mode].n;
 const views={today:todayView,train:trainView,food:foodView,data:dataView,more:moreView};
 el('main').innerHTML=(views[tab]||todayView)();
}
render();
</script>
